<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpiIn Landing Page</title>
  <link rel="icon" type="image/x-icon" href="./src/styles/images/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="main.scss">
</head>

<body class="body">
  <main class="page">
    <div class="container">
      <div class="logo">
        <a href="#" class="logo__image">
          <img src="./src/styles/images/logo.png" alt="logo" class="logo__image__item">
        </a>
      </div>
      <section class="content">
        <div class="gears">
          <div class="gears__photo">
            <div class="gears__photo--1"></div>
            <div class="gears__photo--2"></div>
            <div class="gears__photo--3"></div>
          </div>
        </div>
        <div class="disk">
          <div class="disk__photo--1"></div>
          <div class="disk__photo--2"></div>
        </div>
      </section>
  
      <div class="play-content">
        <div class="wheel">
          <img src="./src/styles/images/wheel-holder.png" alt="wheel" class="wheel__first">
          <img src="./src/styles/images/wheel.png" alt="wheel" class="wheel__second">
          <img src="./src/styles/images/wheel-center.png" alt="wheel" class="wheel__third">
          <img src="./src/styles/images/wheel-win-frame.png" alt="wheel" class="wheel__fourth">
        </div>


          <div class="promo">
            <img src="./src/styles/images/Left_frame.png" alt="Left Frame" class="promo__image">
          </div>

          <div class="promo_2">
            <img src="./src/styles/images/Right_frame.png" alt="Right Frame" class="promo_2__image">
          </div>
        </div>
  
        <div class="button-container">
          <button class="button" id="rotateButton">Oyna</button>
        </div>
      </div>
    </div>
  </main>
  
  <aside class="register hidden" id="registerForm">
    <form class="register__form">
      <div class="register__title">
        <h2 class="register__title__text">Kaydolun</h2>
      </div>
      <div class="register__container">
        <div class="register__promo">
          <p class="register__promo__text">Bonus</p>
          <p class="register__promo__text">Bonus yatırımlara+100%</p>
          <p class="register__promo__text--black">+100 bedava oyun</p>
        </div>
    
        <div class="register__buttons">
          <button type="button" class="register__button register__button--email">E-posta ile</button>
          <button type="button" class="register__button register__button--phone">Telefon ile</button>
        </div>
    
        <div class="register__info">
          <div class="register__field">
            <label class="register__label" for="email">E-posta (gerekli)</label>
            <input type="email" id="email" placeholder="E-posta" class="register__input" required>
          </div>
    
          <div class="register__row">
            <div class="select__content">
              <label class="register__label" for="currency">Para birimi*</label>
              <select id="currency" class="register__input" name="currency" required>
                <option value="TRY">TRY</option>
                <option value="BRL">BRL</option>
                <option value="EUR">EUR</option>
                <option value="USD">USD</option>
              </select>
            </div>
    
            <div class="password__content">
              <label class="register__label" for="password">Parola (gerekli)</label>
              <input type="password" id="password" placeholder="Parola" class="register__input" required autocomplete="current-password">
              <span class="password__icon">&#x1F441;</span>
            </div>
          </div>
        </div>
    
        <button type="submit" class="register__submit">Bonus Kazanın</button>
    
        <p class="register__login">
          Hesabınız yok mu? <a href="#" class="register__link">Giriş yap</a>
        </p>
    
        <div class="register__checkboxes">
          <label>
            <input type="checkbox" required checked class="register__checkbox">
            Hüküm ve <a href="#" class="register__link">koşulları kabul ediyorum</a>
          </label>
          <label>
            <input type="checkbox" required checked class="register__checkbox">E-posta ve SMS yoluyla promosyonlar hakkında bültenler alın
          </label>
        </div>
      </div>
     </form>
    </div>
  </aside>
  

  <script src="script.js"></script>
</body>
</html>
